name: Sync PLM DB to Neon

on:
  push:
    paths:
      - '**.db'          # Triggas automatiskt när plm.db pushas
  workflow_dispatch:     # Eller kör manuellt via GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install sqlite-utils psycopg2-binary

      - name: Convert & sync to Neon
        env:
          NEON_DSN: ${{ secrets.NEON_DSN }}
        run: |
          python3 - <<'EOF'
          import sqlite3, psycopg2, os, glob

          # Hitta .db-filen automatiskt
          db_files = glob.glob("**/*.db", recursive=True)
          if not db_files:
              raise FileNotFoundError("Ingen .db-fil hittades i repot")
          SQLITE_FILE = db_files[0]
          print(f"Använder: {SQLITE_FILE}")

          DSN = os.environ["NEON_DSN"]

          def to_pg_type(t):
              u = (t or "").upper()
              if "INT"    in u: return "BIGINT"
              if "REAL"   in u or "FLOAT" in u or "DOUBLE" in u: return "DOUBLE PRECISION"
              if "BLOB"   in u: return "BYTEA"
              if "BOOL"   in u: return "BOOLEAN"
              if "NUMERIC" in u or "DECIMAL" in u: return "NUMERIC"
              return "TEXT"

          sqlite = sqlite3.connect(SQLITE_FILE)
          pg     = psycopg2.connect(DSN)
          cur    = pg.cursor()

          tables = sqlite.execute(
              "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'"
          ).fetchall()
          tables = [t[0] for t in tables]
          print(f"Tabeller: {tables}")

          for table in reversed(tables):
              cur.execute(f'DROP TABLE IF EXISTS "{table}" CASCADE')
              print(f"DROP: {table}")

          for table in tables:
              cols = sqlite.execute(f'PRAGMA table_info("{table}")').fetchall()
              col_defs = []
              for col in cols:
                  _, name, typ, notnull, _, pk = col
                  pg_type = to_pg_type(typ)
                  pk_str  = " PRIMARY KEY" if pk == 1 else ""
                  nn_str  = " NOT NULL"    if notnull and pk != 1 else ""
                  col_defs.append(f'"{name}" {pg_type}{pk_str}{nn_str}')

              cur.execute(f'CREATE TABLE "{table}" ({", ".join(col_defs)})')

              rows = sqlite.execute(f'SELECT * FROM "{table}"').fetchall()
              if rows:
                  placeholders = ", ".join(["%s"] * len(cols))
                  col_names    = ", ".join([f'"{c[1]}"' for c in cols])
                  cur.executemany(
                      f'INSERT INTO "{table}" ({col_names}) VALUES ({placeholders})',
                      rows
                  )
              print(f"OK: {table} → {len(rows)} rader")

          pg.commit()
          cur.close()
          pg.close()
          sqlite.close()
          print("✅ Sync klar!")
          EOF
```

---

## 🔐 Lägg till din Neon-anslutning som secret

1. Gå till ditt repo på GitHub → **Settings → Secrets and variables → Actions**
2. Klicka **New repository secret**
3. Namn: `NEON_DSN`
4. Värde: din connection string, t.ex:
```
   postgresql://user:pass@ep-xxx.eu-central-1.aws.neon.tech/dbname?sslmode=require
