<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testsida - Develop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .page {
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        .meta {
            margin: 14px 0;
            padding: 12px 14px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        .label {
            font-weight: 700;
        }
        .ok {
            color: #0f766e;
            font-weight: 700;
        }
        .warn {
            color: #b45309;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="page">
        <h1>Testsida (develop)</h1>
        <p>Denna sida används för test av develop-grenen.</p>

        <div class="meta"><span class="label">Branch:</span> {{ branch_name }}</div>
        <div class="meta"><span class="label">Databas:</span> {{ database_uri }}</div>
        <div class="meta">
            <span class="label">Delar databas med main:</span>
            {% if using_main_database %}
                <span class="ok">Ja (MAIN_DATABASE_URL aktiv)</span>
            {% else %}
                <span class="warn">Nej eller okänt (saknar MAIN_DATABASE_URL)</span>
            {% endif %}
        </div>
    </main>
</body>
</html>
