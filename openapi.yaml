basePath: /
consumes:
- application/json
definitions:
  CategoryNode:
    properties:
      code:
        type: string
      description:
        type: string
      id:
        type: integer
      level:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      sort_order:
        type: integer
      system_id:
        type: integer
    type: object
  ChangeManagementImpact:
    properties:
      change_item_id:
        type: integer
      id:
        type: integer
      impact_action:
        enum:
        - to_be_replaced
        - cancellation
        type: string
      object_id:
        type: integer
    type: object
  ChangeManagementItem:
    properties:
      created_at:
        format: date-time
        type: string
      description:
        type: string
      id:
        type: integer
      item_type:
        enum:
        - CRQ
        - CO
        - RO
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  ClassificationSystem:
    properties:
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      node_count:
        type: integer
      version:
        type: string
    type: object
  Document:
    properties:
      created_at:
        format: date-time
        type: string
      file_size:
        type: integer
      filename:
        type: string
      id:
        type: integer
      mime_type:
        type: string
      object_id:
        type: integer
      original_filename:
        type: string
      uploaded_by:
        type: string
    type: object
  Error:
    properties:
      error:
        description: Felmeddelande
        type: string
    type: object
  FieldTemplate:
    properties:
      display_name:
        type: string
      field_name:
        type: string
      field_options:
        type: object
      field_type:
        type: string
      force_presence_on_all_objects:
        type: boolean
      help_text:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      is_required:
        type: boolean
      is_table_visible:
        type: boolean
      lock_required_setting:
        type: boolean
      template_name:
        type: string
    type: object
  Instance:
    properties:
      child_object_id:
        type: integer
      formula:
        type: string
      id:
        type: integer
      installation_sequence:
        type: integer
      instance_type:
        type: string
      metadata_json:
        type: object
      optional:
        type: boolean
      parent_object_id:
        type: integer
      position:
        type: string
      quantity:
        type: number
      role:
        type: string
      unit:
        type: string
      waste_factor:
        type: number
    type: object
  ManagedList:
    properties:
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      items:
        items:
          $ref: '#/definitions/ManagedListItem'
        type: array
      language_codes:
        items:
          type: string
        type: array
      name:
        type: string
    type: object
  ManagedListItem:
    properties:
      id:
        type: integer
      is_active:
        type: boolean
      list_id:
        type: integer
      node_metadata:
        type: object
      parent_item_id:
        type: integer
      sort_order:
        type: integer
      value:
        type: string
      value_translations:
        type: object
    type: object
  Object:
    properties:
      created_at:
        format: date-time
        type: string
      data:
        description: Fältvärden (nyckel = fältnamn)
        type: object
      id:
        type: integer
      id_full:
        description: Unikt sammansatt ID (t.ex. PROD-1.v1)
        type: string
      main_id:
        type: string
      object_type:
        type: string
      object_type_id:
        type: integer
      status:
        type: string
      updated_at:
        format: date-time
        type: string
      version:
        type: string
    type: object
  ObjectCategoryAssignment:
    properties:
      category_node:
        $ref: '#/definitions/CategoryNode'
      category_node_id:
        type: integer
      id:
        type: integer
      is_primary:
        type: boolean
      object_id:
        type: integer
    type: object
  ObjectField:
    properties:
      detail_width:
        enum:
        - full
        - half
        - third
        type: string
      display_name:
        type: string
      display_order:
        type: integer
      field_name:
        type: string
      field_options:
        type: object
      field_type:
        enum:
        - text
        - number
        - date
        - boolean
        - select
        - computed
        type: string
      help_text:
        type: string
      id:
        type: integer
      is_detail_visible:
        type: boolean
      is_required:
        type: boolean
      is_table_visible:
        type: boolean
      object_type_id:
        type: integer
    type: object
  ObjectRelation:
    properties:
      created_at:
        format: date-time
        type: string
      description:
        type: string
      direction:
        description: Sätts när relationer hämtas för ett specifikt objekt
        enum:
        - incoming
        - outgoing
        type: string
      id:
        type: integer
      relation_metadata:
        type: object
      relation_type:
        type: string
      source_object_id:
        type: integer
      target_object_id:
        type: integer
    type: object
  ObjectType:
    properties:
      color:
        type: string
      description:
        type: string
      fields:
        items:
          $ref: '#/definitions/ObjectField'
        type: array
      icon:
        type: string
      id:
        type: integer
      id_prefix:
        type: string
      is_system:
        type: boolean
      name:
        type: string
    type: object
  RelationTypeRule:
    properties:
      id:
        type: integer
      is_allowed:
        type: boolean
      relation_type:
        type: string
      source_object_type_id:
        type: integer
      source_object_type_name:
        type: string
      target_object_type_id:
        type: integer
      target_object_type_name:
        type: string
    type: object
info:
  contact:
    name: Ondfrukt
    url: https://github.com/ondfrukt/byggdelsuppdelning---demo
  description: REST API för Byggdelsuppdelning – ett PLM-system (Product Lifecycle
    Management) för hantering av byggdelar, objekttyper, relationer, dokument, klassificering
    och ändringshantering. Alla endpoints börjar med `/api/`.
  title: Byggdelsuppdelning API
  version: 1.0.0
paths:
  /api/category-nodes:
    get:
      parameters:
      - description: Filtrera på klassificeringssystem
        in: query
        name: system_id
        required: false
        type: integer
      - description: Filtrera på nivå
        in: query
        name: level
        required: false
        type: integer
      - description: Filtrera på föräldernod-ID
        in: query
        name: parent_id
        required: false
        type: integer
      responses:
        '200':
          description: Lista med kategorinoder
          schema:
            items:
              $ref: '#/definitions/CategoryNode'
            type: array
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
      summary: List category nodes
      tags:
      - Category Nodes
    post:
      consumes:
      - application/json
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            code:
              description: Klassificeringskod
              type: string
            description:
              type: string
            name:
              description: Nodens namn
              type: string
            parent_id:
              description: Föräldernod-ID (null för rotnod)
              type: integer
            sort_order:
              type: integer
            system_id:
              description: Klassificeringssystemets ID
              type: integer
          required:
          - name
          - system_id
          type: object
      responses:
        '201':
          description: Nod skapad
          schema:
            $ref: '#/definitions/CategoryNode'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Föräldernod eller system hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Create a category node
      tags:
      - Category Nodes
  /api/category-nodes/batch:
    get:
      parameters:
      - description: Kommaseparerade nod-ID:n (t.ex. 1,2,3)
        in: query
        name: ids
        required: true
        type: string
      responses:
        '200':
          description: Karta med nod-ID som nyckel
          schema:
            additionalProperties:
              properties:
                name:
                  type: string
                path_string:
                  description: Fullständig sökväg (t.ex. Bygg › Stomme › Betong)
                  type: string
              type: object
            type: object
      summary: 'Return {id: {name, path_string}} for a list of node IDs in one request.'
      tags:
      - Category Nodes
  /api/category-nodes/object-tree:
    get:
      parameters:
      - description: Klassificeringssystemets namn
        in: query
        name: system_name
        required: true
        type: string
      responses:
        '200':
          description: Noder med objekt och barn
          schema:
            items:
              type: object
            type: array
      summary: Return category nodes with assigned objects and their direct relations
        as children.
      tags:
      - Category Nodes
  /api/category-nodes/{node_id}:
    delete:
      parameters:
      - description: Nodens ID
        in: path
        name: node_id
        required: true
        type: integer
      responses:
        '200':
          description: Nod borttagen
          schema:
            properties:
              message:
                type: string
            type: object
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
        '409':
          description: Noden har barn eller kopplade objekt
          schema:
            $ref: '#/definitions/Error'
      summary: Delete a category node
      tags:
      - Category Nodes
    get:
      parameters:
      - description: Nodens ID
        in: path
        name: node_id
        required: true
        type: integer
      - default: false
        description: Inkludera fullständig sökväg
        in: query
        name: include_path
        required: false
        type: boolean
      responses:
        '200':
          description: Kategorinoden
          schema:
            $ref: '#/definitions/CategoryNode'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Get a single category node
      tags:
      - Category Nodes
    put:
      parameters:
      - description: Nodens ID
        in: path
        name: node_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            code:
              type: string
            description:
              type: string
            is_active:
              type: boolean
            name:
              type: string
            sort_order:
              type: integer
          type: object
      responses:
        '200':
          description: Uppdaterad nod
          schema:
            $ref: '#/definitions/CategoryNode'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Update a category node
      tags:
      - Category Nodes
  /api/category-nodes/{node_id}/ancestors:
    get:
      parameters:
      - description: Nodens ID
        in: path
        name: node_id
        required: true
        type: integer
      responses:
        '200':
          description: Lista med förfäder (rot → förälder)
          schema:
            items:
              $ref: '#/definitions/CategoryNode'
            type: array
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Get all ancestors of a category node
      tags:
      - Category Nodes
  /api/category-nodes/{node_id}/move:
    post:
      parameters:
      - description: Nodens ID
        in: path
        name: node_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            new_parent_id:
              description: Ny föräldernod-ID (null för rotnod)
              type: integer
          required:
          - new_parent_id
          type: object
      responses:
        '200':
          description: Nod flyttad
          schema:
            $ref: '#/definitions/CategoryNode'
        '400':
          description: Valideringsfel (t.ex. cirkulär referens)
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Move a category node to a new parent
      tags:
      - Category Nodes
  /api/category-nodes/{node_id}/tree:
    get:
      parameters:
      - description: Rotnodensins ID
        in: path
        name: node_id
        required: true
        type: integer
      responses:
        '200':
          description: Noden med alla descendanter
          schema:
            $ref: '#/definitions/CategoryNode'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Get a category node tree rooted at this node
      tags:
      - Category Nodes
  /api/change-management:
    get:
      parameters:
      - description: Filtrera på ärendetyp
        enum:
        - CRQ
        - CO
        - RO
        in: query
        name: type
        required: false
        type: string
      - description: Fritextsökning i titel, beskrivning och status
        in: query
        name: search
        required: false
        type: string
      responses:
        '200':
          description: Lista med ändringsärenden
          schema:
            items:
              $ref: '#/definitions/ChangeManagementItem'
            type: array
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: List change management items.
      tags:
      - Change Management
    post:
      consumes:
      - application/json
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            description:
              type: string
            status:
              default: Open
              type: string
            title:
              description: Titel (obligatorisk)
              type: string
            type:
              description: Ärendetyp
              enum:
              - CRQ
              - CO
              - RO
              type: string
          required:
          - type
          - title
          type: object
      responses:
        '201':
          description: Ändringsärende skapat
          schema:
            $ref: '#/definitions/ChangeManagementItem'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: Create a change management item.
      tags:
      - Change Management
  /api/change-management/{item_key}:
    delete:
      parameters:
      - description: Ärendets nyckel
        in: path
        name: item_key
        required: true
        type: string
      responses:
        '200':
          description: Borttaget
          schema:
            properties:
              message:
                type: string
            type: object
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: Delete a change management item.
      tags:
      - Change Management
    get:
      parameters:
      - description: Ärendets nyckel (t.ex. CO-42 eller 42)
        in: path
        name: item_key
        required: true
        type: string
      responses:
        '200':
          description: Ändringsärendet
          schema:
            $ref: '#/definitions/ChangeManagementItem'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: Get one change management item.
      tags:
      - Change Management
    put:
      parameters:
      - description: Ärendets nyckel
        in: path
        name: item_key
        required: true
        type: string
      - in: body
        name: body
        required: true
        schema:
          properties:
            description:
              type: string
            status:
              type: string
            title:
              type: string
            type:
              enum:
              - CRQ
              - CO
              - RO
              type: string
          type: object
      responses:
        '200':
          description: Uppdaterat ändringsärende
          schema:
            $ref: '#/definitions/ChangeManagementItem'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: Update a change management item.
      tags:
      - Change Management
  /api/change-management/{item_key}/impacts:
    get:
      parameters:
      - description: Ärendets nyckel
        in: path
        name: item_key
        required: true
        type: string
      responses:
        '200':
          description: Lista med påverkade objekt
          schema:
            items:
              $ref: '#/definitions/ChangeManagementImpact'
            type: array
        '404':
          description: Ändringsärendet hittades inte
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: List impacted objects for one change item.
      tags:
      - Change Management
    post:
      parameters:
      - description: Ärendets nyckel
        in: path
        name: item_key
        required: true
        type: string
      - in: body
        name: body
        required: true
        schema:
          properties:
            impact_action:
              default: to_be_replaced
              enum:
              - to_be_replaced
              - cancellation
              type: string
            object_id:
              description: Påverkat objekts ID
              type: integer
          required:
          - object_id
          type: object
      responses:
        '201':
          description: Påverkan registrerad
          schema:
            $ref: '#/definitions/ChangeManagementImpact'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Ändringsärende eller objekt hittades inte
          schema:
            $ref: '#/definitions/Error'
        '409':
          description: Objektet redan kopplat till detta ärende
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: Add impacted object to one change item.
      tags:
      - Change Management
  /api/change-management/{item_key}/impacts/{impact_id}:
    delete:
      parameters:
      - description: Ärendets nyckel
        in: path
        name: item_key
        required: true
        type: string
      - description: Påverkans ID
        in: path
        name: impact_id
        required: true
        type: integer
      responses:
        '200':
          description: Borttagen
          schema:
            properties:
              message:
                type: string
            type: object
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: Delete impacted object row.
      tags:
      - Change Management
    put:
      parameters:
      - description: Ärendets nyckel
        in: path
        name: item_key
        required: true
        type: string
      - description: Påverkans ID
        in: path
        name: impact_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            impact_action:
              enum:
              - to_be_replaced
              - cancellation
              type: string
          type: object
      responses:
        '200':
          description: Uppdaterad påverkan
          schema:
            $ref: '#/definitions/ChangeManagementImpact'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: Update impacted object row.
      tags:
      - Change Management
  /api/classification-systems:
    get:
      parameters:
      - default: false
        description: Inkludera inaktiva system
        in: query
        name: include_inactive
        required: false
        type: boolean
      responses:
        '200':
          description: Lista med klassificeringssystem
          schema:
            items:
              $ref: '#/definitions/ClassificationSystem'
            type: array
      summary: List all classification systems
      tags:
      - Classification Systems
    post:
      consumes:
      - application/json
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            description:
              type: string
            is_active:
              default: true
              type: boolean
            name:
              description: Systemets namn
              type: string
            version:
              type: string
          required:
          - name
          type: object
      responses:
        '201':
          description: System skapat
          schema:
            $ref: '#/definitions/ClassificationSystem'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
      summary: Create a classification system
      tags:
      - Classification Systems
  /api/classification-systems/{system_id}:
    delete:
      parameters:
      - description: Systemets ID
        in: path
        name: system_id
        required: true
        type: integer
      responses:
        '200':
          description: Borttaget
          schema:
            properties:
              message:
                type: string
            type: object
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
        '409':
          description: Systemet har noder och kan ej tas bort
          schema:
            $ref: '#/definitions/Error'
      summary: Delete a classification system
      tags:
      - Classification Systems
    get:
      parameters:
      - description: Systemets ID
        in: path
        name: system_id
        required: true
        type: integer
      responses:
        '200':
          description: Klassificeringssystemet
          schema:
            $ref: '#/definitions/ClassificationSystem'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Get a single classification system
      tags:
      - Classification Systems
    put:
      parameters:
      - description: Systemets ID
        in: path
        name: system_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            description:
              type: string
            is_active:
              type: boolean
            name:
              type: string
            version:
              type: string
          type: object
      responses:
        '200':
          description: Uppdaterat system
          schema:
            $ref: '#/definitions/ClassificationSystem'
        '400':
          description: Valideringsfel
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Hittades inte
          schema:
            $ref: '#/definitions/Error'
      summary: Update a classification system
      tags:
      - Classification Systems
  /api/field-templates:
    get:
      parameters:
      - default: false
        description: Inkludera inaktiva mallar
        in: query
        name: include_inactive
        required: false
        type: boolean
      responses:
        '200':
          description: Lista med fältmallar
          schema:
            items:
              $ref: '#/definitions/FieldTemplate'
            type: array
        '500':
          description: Serverfel
          schema:
            $ref: '#/definitions/Error'
      summary: List all field templates
      tags:
      - Field Templates
    post:
      consumes:
      - application/json
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            display_name:
              type: string
            field_name:
              description: Fältnamn (lowercase)
              type: string
            field_options:
              type: object
            field_type:
              description: 'Typ: text, number, date, boolean, select, computed'
